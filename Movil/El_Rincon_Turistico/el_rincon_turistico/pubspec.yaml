name: el_rincon_turistico
description: "The Tourist Rincón - App móvil de turismo en Colombia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.0
  intl: ^0.20.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  share_plus: ^10.1.3
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.1
  google_fonts: ^6.2.1
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  pull_to_refresh_flutter3: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
