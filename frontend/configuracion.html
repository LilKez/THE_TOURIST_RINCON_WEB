<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - TravelApp</title>
    <link rel="stylesheet" href="css/configuracion.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <header class="settings-header">
            <div class="header-content">
                <i class="fas fa-cog gear-icon"></i>
                <div>
                    <h1>Ajustes de Usuario</h1>
                    <p>Personaliza tu experiencia de viaje</p>
                </div>
            </div>
            <a href="index.html" class="btn-back">Volver al Inicio</a>
            
        </header>

        <main class="settings-grid">
            <section class="settings-card">
                <div class="card-header">
                    <i class="fas fa-bell"></i>
                    <h2>Notificaciones Push</h2>
                </div>
                <div class="card-item highlight">
                    <div class="item-info">
                        <i class="fas fa-envelope-open-text blue-icon"></i>
                        <div>
                            <span>Recibir notificaciones</span>
                            <small id="estadoNotis" class="text-danger">Desactivado</small>
                        </div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="checkNotis" onchange="actualizarTextoNoti()">
                        <span class="slider round"></span>
                    </label>
                </div>
            </section>

            <section class="settings-card">
                <div class="card-header">
                    <i class="fas fa-coins"></i>
                    <h2>Moneda de visualización</h2>
                </div>
                <div class="selector-wrapper">
                    <select id="selectMoneda" class="select-pro">
                        <option value="COP">🇨🇴 Peso Colombiano (COP) - $</option>
                        <option value="USD">🇺🇸 Dólar estadounidense (USD) - $</option>
                        <option value="EUR">🇪🇺 Euro (EUR) - €</option>
                        <option value="JPY">🇯🇵 Yen Japonés (JPY) - ¥</option>
                        <option value="MXN">🇲🇽 Peso mexicano (MXN) - $</option>
                    </select>
                    <i class="fas fa-chevron-down arrow"></i>
                </div>
            </section>
        </main>

        <footer class="settings-footer">
            <button class="btn-save-main" onclick="guardarTodo()">
                <i class="fas fa-check"></i> Guardar Cambios
            </button>
        </footer>
    </div>

    <script src="js/config.js"></script>
</body>
</html>
