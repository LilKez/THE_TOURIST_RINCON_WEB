<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - THE TOURIST RINCÓN</title>
    <link rel="icon" href="../img/Logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Estilos -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="css/admin.css">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="main-nav">
    <div class="nav-container">
        <div class="header-brand">
            <img src="../img/Logo.png" alt="Logo" class="logo">
            <div class="logo-text">
                <h1>Panel Administrador</h1>
                <span>THE TOURIST RINCÓN</span>
            </div>
        </div>

        <ul class="nav-links">
            <li>
                <a href="../index.html" class="btn-inicio">
                    <i class="fa fa-home"></i> Inicio
                </a>
            </li>
        </ul>

        <button class="btn-login-modern" onclick="cerrarSesion()">
            <i class="fa fa-sign-out-alt"></i> Cerrar sesión
        </button>
    </div>
</header>

<main class="admin-panel">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>Menú Admin</h3>
        <ul>
            <li><a href="#" onclick="mostrarSeccion('destinos')" class="active"><i class="fa fa-map"></i> Destinos</a></li>
            <li><a href="#" onclick="mostrarSeccion('usuarios')"><i class="fa fa-users"></i> Perfiles</a></li>
            <li><a href="#" onclick="mostrarSeccion('reservas')"><i class="fa fa-calendar"></i> Reservas</a></li>
        </ul>
    </aside>

    <!-- CONTENIDO -->
    <section class="content">

        <!-- DESTINOS -->
        <div id="destinos" class="seccion activa">
            <div class="section-header">
                <h2><i class="fa fa-map"></i> Gestionar Destinos</h2>
                <button onclick="abrirModalDestino()" class="btn-add">
                    <i class="fa fa-plus"></i> Añadir Destino
                </button>
            </div>
            <div id="listaDestinosAdmin" class="destinos-grid"></div>
        </div>

        <!-- PERFILES -->
        <div id="usuarios" class="seccion">
            <div class="section-header">
                <h2><i class="fa fa-users"></i> Gestionar Perfiles</h2>
            </div>
            <div id="listaUsuarios"></div>
        </div>

        <!-- RESERVAS -->
        <div id="reservas" class="seccion">
            <div class="section-header">
                <h2><i class="fa fa-calendar"></i> Gestión de Reservas</h2>
            </div>
            <div class="tabla-container">
                <table class="tabla-reservas">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Email</th>
                            <th>Destino</th>
                            <th>Fecha</th>
                            <th>Personas</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaReservas"></tbody>
                </table>
            </div>
        </div>

    </section>
</main>

<!-- MODAL DESTINO -->
<div id="modalDestino" class="modal oculto">
    <div class="modal-content">
        <h3 id="modalTitle">Añadir Destino</h3>
        <form id="formDestino">
            <input type="hidden" id="destinoId">
            <div class="form-grid">
                <div>
                    <label>Ciudad</label>
                    <input type="text" id="destinoNombre" placeholder="Nombre de la ciudad" required>
                </div>
                <div>
                    <label>País</label>
                    <input type="text" id="destinoPais" placeholder="País" required>
                </div>
                <div>
                    <label>Categoría</label>
                    <input type="text" id="destinoCategoria" placeholder="Ej: Playa, Montaña" required>
                </div>
                <div>
                    <label>Clima</label>
                    <input type="text" id="destinoClima" placeholder="Ej: Tropical" required>
                </div>
                <div>
                    <label>Precio</label>
                    <input type="number" id="destinoPrecio" min="0" placeholder="0" required>
                </div>
                <div>
                    <label>Puntuación</label>
                    <input type="number" step="0.1" id="destinoRating" min="0" max="5" placeholder="5" required>
                </div>
            </div>
            <div>
                <label>Descripción</label>
                <textarea id="destinoDescripcion" placeholder="Descripción del destino" required></textarea>
            </div>
            <div class="form-buttons">
                <button type="submit">Guardar</button>
                <button type="button" onclick="cerrarModalDestino()">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script src="js/admin.js" defer></script>

</body>
</html>
