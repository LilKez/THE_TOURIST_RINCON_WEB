<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmar pago | THE TOURIST RINCÓN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ESTILOS -->
     <link rel="stylesheet" href="css/base.css">
     <link rel="stylesheet" href="css/pago.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body class="pago-page">

<header class="header-pago">
    <h1>THE TOURIST RINCÓN</h1>
    <p>Confirmar pago de reserva</p>
</header>

<section class="pago-container">

    <div class="pago-card">

        <!-- RESUMEN DESTINO -->
        <h2 class="pago-titulo">Resumen de reserva</h2>
        <div class="destino-resumen">
            <img src="https://images.unsplash.com/photo-1586611292717-f828b167408c" alt="Cartagena">
            <div class="resumen-info">
                <h3>Cartagena</h3>
                <p>2 personas • 5 noches</p>
                <div class="precio-resumen">
                    <span>Subtotal:</span>
                    <span>$1.200.000</span>
                </div>
                <div class="precio-resumen">
                    <span>Impuestos:</span>
                    <span>$300.000</span>
                </div>
                <div class="precio-total">
                    <span>Total:</span>
                    <span>$1.500.000</span>
                </div>
            </div>
        </div>

        <!-- FORMULARIO PAGO -->
        <form class="formulario-pago">
            <h3>Método de pago</h3>
            
            <div class="campo-pago">
                <label for="metodo">Seleccionar método:</label>
                <select id="metodo" name="metodo" required>
                    <option value="">-- Elige una opción --</option>
                    <option value="tarjeta">Tarjeta de crédito</option>
                    <option value="nequi">Nequi</option>
                    <option value="pse">PSE</option>
                    <option value="transferencia">Transferencia bancaria</option>
                </select>
            </div>

            <!-- CAMPOS TARJETA (mostrar si se selecciona) -->
            <div id="tarjeta-campos" class="tarjeta-campos">
                <div class="campo-pago">
                    <label for="titular">Titular de la tarjeta:</label>
                    <input type="text" id="titular" name="titular" placeholder="Nombre completo" required>
                </div>

                <div class="campo-pago">
                    <label for="numero">Número de tarjeta:</label>
                    <input type="text" id="numero" name="numero" placeholder="1234 5678 9012 3456" maxlength="19" required>
                </div>

                <div class="campo-fila">
                    <div class="campo-pago">
                        <label for="vencimiento">Vencimiento:</label>
                        <input type="text" id="vencimiento" name="vencimiento" placeholder="MM/AA" maxlength="5" required>
                    </div>
                    <div class="campo-pago">
                        <label for="cvv">CVV:</label>
                        <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="4" required>
                    </div>
                </div>
            </div>

            <!-- ACEPTAR TÉRMINOS -->
            <div class="campo-pago checkbox">
                <input type="checkbox" id="terminos" name="terminos" required>
                <label for="terminos">Acepto los términos y condiciones</label>
            </div>

            <button type="submit" class="btn-pagar">Confirmar pago</button>
            <a href="index.html" class="btn-cancelar">Cancelar</a>
        </form>

    </div>

</section>

<script src="js/app.js"></script>
</body>
</html>
